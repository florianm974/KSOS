<!doctype html>
<html lang="fr" data-theme="default">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark light" />
    <title>KSOS — Portail de jeux & Projets</title>
    <meta
      name="description"
      content="Portail regroupant les jeux et projets du collectif KSOS, développeurs passionnés à La Réunion."
    />

    <!-- SEO & Réseaux Sociaux (Open Graph / Twitter Cards) -->
    <meta property="og:title" content="KSOS — Portail de jeux & Projets" />
    <meta
      property="og:description"
      content="Découvrez les jeux (Le Petit Bac, VroomDle...) et projets du collectif KSOS, développeurs passionnés à La Réunion."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://florianm974.github.io/KSOS/" />
    <!-- Remplacer l'URL ci-dessous par une vraie capture d'écran du site -->
    <meta
      property="og:image"
      content="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1200&auto=format&fit=crop"
    />
    <meta name="twitter:card" content="summary_large_image" />

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link href="./style.css" rel="stylesheet" />

    <!-- Prévention du flash blanc au chargement -->
    <script>
      const savedTheme = localStorage.getItem("ksosTheme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.classList.add("light-mode");
      }
      const savedColorTheme =
        localStorage.getItem("ksosColorTheme") || "default";
      document.documentElement.setAttribute("data-theme", savedColorTheme);
    </script>

  </head>

  <body class="relative selection:bg-white/20 selection:text-white">
    <!-- Splash Screen (Chargement d'intro) -->
    <div id="splash-screen">
      <div class="splash-text-container">
        <div class="splash-logo">KSOS</div>
        <div class="splash-subtitle">
          4 développeurs réunis en un même endroit
        </div>
      </div>
    </div>

    <!-- Fond Animé -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <!-- Languette Paramètres (En haut à droite) -->
    <button
      id="settings-notch"
      type="button"
      aria-label="Ouvrir les paramètres"
      class="fixed top-0 right-4 md:right-8 top-notch border-b border-l border-r border-white/20 px-5 py-2.5 rounded-b-2xl z-[9000] cursor-pointer hover:bg-white/10 transition-all duration-300 flex items-center gap-2 group shadow-lg hover:translate-y-1"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5 text-gray-400 group-hover:text-white transition-all duration-500 transform group-hover:rotate-90"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2.5"
          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
        />
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2.5"
          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
        />
      </svg>
      <span
        class="text-[10px] font-bold text-gray-400 uppercase tracking-widest group-hover:text-gray-200 transition-colors hidden sm:block"
        >Paramètres</span
      >
    </button>

    <!-- Modale Paramètres -->
    <div
      id="settings-modal-overlay"
      class="fixed inset-0 bg-black/60 backdrop-blur-md z-[99999] flex justify-center items-center opacity-0 pointer-events-none transition-opacity duration-400"
    >
      <div
        class="custom-modal border border-white/20 rounded-3xl p-8 max-w-sm w-full mx-4 shadow-2xl transform scale-90 relative transition-transform duration-400"
      >
        <button
          id="close-settings"
          class="absolute top-5 right-5 text-gray-400 hover:text-white transition-colors"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>
        <h3
          class="text-white text-2xl font-black mb-6 text-center tracking-wide font-display"
        >
          Préférences
        </h3>

        <!-- Thèmes de Couleurs -->
        <div
          class="flex flex-col bg-black/30 p-5 rounded-2xl border border-white/10 mb-4 shadow-inner gap-4"
        >
          <span
            class="text-white font-bold tracking-widest uppercase text-sm font-display"
            >Thème Visuel 🎨</span
          >
          <div class="grid grid-cols-2 gap-3" id="theme-selector">
            <label
              class="cursor-pointer flex items-center gap-2 bg-white/5 p-2 rounded-xl border border-white/10 hover:bg-white/10 transition-colors"
            >
              <input
                type="radio"
                name="color-theme"
                value="default"
                class="hidden"
              />
              <div
                class="w-5 h-5 rounded-full bg-gradient-to-r from-[#ff5252] to-[#ff9a3c] transition-transform duration-200"
              ></div>
              <span
                class="text-[11px] font-bold text-gray-300 uppercase tracking-wide"
                >Original</span
              >
            </label>
            <label
              class="cursor-pointer flex items-center gap-2 bg-white/5 p-2 rounded-xl border border-white/10 hover:bg-white/10 transition-colors"
            >
              <input
                type="radio"
                name="color-theme"
                value="cyberpunk"
                class="hidden"
              />
              <div
                class="w-5 h-5 rounded-full bg-gradient-to-r from-[#00f0ff] to-[#7000ff] transition-transform duration-200"
              ></div>
              <span
                class="text-[11px] font-bold text-gray-300 uppercase tracking-wide"
                >Cyberpunk</span
              >
            </label>
            <label
              class="cursor-pointer flex items-center gap-2 bg-white/5 p-2 rounded-xl border border-white/10 hover:bg-white/10 transition-colors"
            >
              <input
                type="radio"
                name="color-theme"
                value="toxic"
                class="hidden"
              />
              <div
                class="w-5 h-5 rounded-full bg-gradient-to-r from-[#39ff14] to-[#00d4a0] transition-transform duration-200"
              ></div>
              <span
                class="text-[11px] font-bold text-gray-300 uppercase tracking-wide"
                >Toxique</span
              >
            </label>
            <label
              class="cursor-pointer flex items-center gap-2 bg-white/5 p-2 rounded-xl border border-white/10 hover:bg-white/10 transition-colors"
            >
              <input
                type="radio"
                name="color-theme"
                value="synthwave"
                class="hidden"
              />
              <div
                class="w-5 h-5 rounded-full bg-gradient-to-r from-[#ff00ff] to-[#00ffff] transition-transform duration-200"
              ></div>
              <span
                class="text-[11px] font-bold text-gray-300 uppercase tracking-wide"
                >Synthwave</span
              >
            </label>
          </div>
        </div>

        <!-- Mode Sombre / Clair -->
        <div
          class="flex items-center justify-between bg-black/30 p-5 rounded-2xl border border-white/10 shadow-inner"
        >
          <span
            class="text-white font-bold tracking-widest uppercase text-sm font-display"
            id="theme-label"
            >Mode Sombre 🌙</span
          >
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="theme-toggle" class="sr-only peer" />
            <div
              class="w-14 h-7 bg-white/20 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all toggle-track"
            ></div>
          </label>
        </div>
      </div>
    </div>

    <!-- Contenu Principal -->
    <main
      id="main-content"
      class="relative z-10 w-full max-w-6xl mx-auto px-6 py-12 md:py-20 flex flex-col gap-16 opacity-0"
    >
      <!-- HEADER / HERO -->
      <header class="flex flex-col items-center text-center gap-6">
        <h1
          class="text-6xl md:text-8xl font-black font-display text-gradient tracking-tighter drop-shadow-2xl"
        >
          KSOS
        </h1>
        <p
          class="text-gray-400 font-bold uppercase tracking-[0.2em] text-xs md:text-sm max-w-lg leading-relaxed"
        >
          Collectif de développeurs <br />
          Projets réunis en un seul endroit
        </p>

        <!-- Membres (Générés par JS) -->
        <div
          class="flex flex-wrap justify-center gap-3 mt-4"
          id="members-container"
        ></div>
      </header>

      <!-- SECTION JEUX -->
      <section class="flex flex-col gap-8">
        <div class="flex items-center gap-6">
          <h2
            class="text-xl md:text-2xl font-black font-display uppercase tracking-widest text-white"
          >
            Jeux
          </h2>
          <div
            class="flex-1 h-px bg-gradient-to-r from-white/10 to-transparent"
          ></div>
        </div>
        <div
          class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-2 gap-6"
          id="games-container"
        ></div>
      </section>

      <!-- SECTION OUTILS & PROJETS PERSO -->
      <section class="flex flex-col gap-8">
        <div class="flex items-center gap-6">
          <h2
            class="text-xl md:text-2xl font-black font-display uppercase tracking-widest text-white"
          >
            Outils & Profils
          </h2>
          <div
            class="flex-1 h-px bg-gradient-to-r from-white/10 to-transparent"
          ></div>
        </div>
        <div
          class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-2 gap-6"
          id="projects-container"
        ></div>
      </section>

      <!-- FOOTER -->
      <footer
        class="mt-8 py-8 border-t border-white/10 text-center relative z-10"
      >
        <p
          class="text-xs font-bold uppercase tracking-widest text-gray-500 font-display mb-3"
        >
          © <span id="current-year"></span> KSOS
        </p>
        <div
          class="flex justify-center flex-wrap gap-4 text-xs font-bold text-gray-600"
          id="footer-links"
        ></div>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
