<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="KSOS - Portail de jeux et projets">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#08080f"/>
      <stop offset="100%" stop-color="#141225"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff5252"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ff9a3c"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="230" cy="140" r="180" fill="#ff5252" opacity="0.12"/>
  <circle cx="990" cy="520" r="220" fill="#a855f7" opacity="0.14"/>
  <circle cx="760" cy="120" r="140" fill="#ff9a3c" opacity="0.1"/>

  <g filter="url(#glow)">
    <text x="90" y="290" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="176" font-weight="800" fill="url(#accent)">KSOS</text>
  </g>

  <text x="94" y="365" font-family="Outfit, Segoe UI, sans-serif" font-size="42" fill="#d1d5db" letter-spacing="1.5">Portail de jeux et projets</text>
  <text x="94" y="425" font-family="Outfit, Segoe UI, sans-serif" font-size="28" fill="#9ca3af">Collectif de developpeurs a La Reunion</text>

  <rect x="94" y="472" width="330" height="54" rx="27" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
  <text x="125" y="507" font-family="Outfit, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#e5e7eb">florianm974.github.io/KSOS</text>
</svg>
